---
# playbook: init-control.yml
# Initialize the Kubernetes control plane on the first master node
- hosts: k8s_masters
  become: true
  vars:
    pod_network_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
    k8s_version: "1.35.2"

  handlers:
    - name: restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

  tasks:
    # ── containerd ──────────────────────────────────────────
    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      ansible.builtin.shell:
        cmd: containerd config default > /etc/containerd/config.toml
        creates: /etc/containerd/config.toml

    - name: Set SystemdCgroup to true
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

    - name: Flush handlers to restart containerd before kubeadm
      ansible.builtin.meta: flush_handlers

    # ── crictl ───────────────────────────────────────────────
    - name: Create crictl config
      ansible.builtin.copy:
        dest: /etc/crictl.yaml
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 10
          debug: false
        mode: '0644'

    # ── kubernetes control plane ─────────────────────────────
    - name: Check if cluster is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf

    - name: Initialize Kubernetes control plane
      ansible.builtin.command:
        cmd: >
          kubeadm init
          --pod-network-cidr={{ pod_network_cidr }}
          --service-cidr={{ service_cidr }}
          --kubernetes-version={{ k8s_version }}
      register: kubeadm_init
      when: not k8s_admin_conf.stat.exists

    - name: Create .kube directory for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'

    - name: Copy admin.conf to root user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Generate join command
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Store join command as fact
      ansible.builtin.set_fact:
        k8s_join_command: "{{ join_command.stdout }}"


