[k8s_nodes]
vm-1 ansible_host=vm-1
vm-2 ansible_host=vm-2
vm-3 ansible_host=vm-3

[k8s_nodes:vars]
ansible_user=root
ansible_port=5476
ansible_ssh_private_key_file=~/.ssh/yc-dev

[k8s_masters]
vm-1 ansible_host=vm-1
#vm-1 ansible_host=vm-1 ansible_ssh_private_key_file=~/.ssh/yc-dev

[k8s_masters:vars]
ansible_user=root
ansible_port=5476
ansible_ssh_private_key_file=~/.ssh/yc-dev


[k8s_workers]
vm-2 ansible_host=vm-2
vm-3 ansible_host=vm-3

[k8s_workers:vars]
ansible_user=root
ansible_port=5476
ansible_ssh_private_key_file=~/.ssh/yc-dev
