# inventory.yml
all:
  children:
    k8s_nodes:
      hosts:
        vm-1:
          ansible_host: vm-1
        vm-2:
          ansible_host: vm-2
        vm-3:
          ansible_host: vm-3
      vars:
        ansible_user: root
        ansible_port: 5476
        ansible_ssh_private_key_file: ~/.ssh/yc-dev

    k8s_masters:
      hosts:
        vm-1:
          ansible_host: vm-1
      vars:
        ansible_user: root
        ansible_port: 5476
        ansible_ssh_private_key_file: ~/.ssh/yc-dev

    k8s_workers:
      hosts:
        vm-2:
          ansible_host: vm-2
        vm-3:
          ansible_host: vm-3
      vars:
        ansible_user: root
        ansible_port: 5476
        ansible_ssh_private_key_file: ~/.ssh/yc-dev
