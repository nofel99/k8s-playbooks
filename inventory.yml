# inventory.yml

all:
  vars:
    ansible_user: root
    ansible_port: 22
    ansible_ssh_private_key_file: ~/.ssh/yc-dev
  children:
    k8s_nodes:
      children:
        k8s_masters:
        k8s_workers:
    k8s_masters:
      hosts:
        vm-1:
          ansible_host: vm-1
    k8s_workers:
      hosts:
        vm-2:
          ansible_host: vm-2
        vm-3:
          ansible_host: vm-3
